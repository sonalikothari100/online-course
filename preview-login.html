<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview Login: Sonali Kothari Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: "#0A192F",
            cardBg: "#172A45",
            cardBorder: "#233554",
            tealAccent: "#64FFDA",
            goldAccent: "#FFD700",
            textPrimary: "#CCD6F6",
            textSecondary: "#8892B0",
            success: "#10B981"
          },
          fontFamily: {
            sans: ["Inter", "sans-serif"],
            display: ["Outfit", "sans-serif"]
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #0A192F;
      color: #CCD6F6;
      font-family: 'Inter', sans-serif;
    }
    .glass-panel {
      background: rgba(23, 42, 69, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(35, 53, 84, 0.5);
    }
  </style>
</head>
<body class="flex min-h-screen items-center justify-center bg-background px-4 py-12 sm:px-6 lg:px-8 relative overflow-hidden">
  
  <div class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] rounded-full bg-tealAccent/5 blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-[-20%] right-[-10%] w-[500px] h-[500px] rounded-full bg-goldAccent/5 blur-[120px] pointer-events-none"></div>

  <div class="w-full max-w-md space-y-8 glass-panel p-8 rounded-2xl border border-cardBorder/60 shadow-2xl relative z-10">
    <div class="text-center">
      <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-full bg-tealAccent/10 text-tealAccent font-bold text-xl">
        🧭
      </div>
      <h2 class="mt-6 text-3xl font-bold tracking-tight font-display text-textPrimary">
        Academy Login
      </h2>
      <p class="mt-2 text-sm text-textSecondary">
        Sign in with the credentials provided by Sonali
      </p>
    </div>

    <!-- Error Alert Box -->
    <div id="errorBox" class="p-3 text-xs bg-red-950/40 border border-red-500/30 text-red-300 rounded-md hidden"></div>

    <form class="mt-8 space-y-6" onsubmit="handleLogin(event)">
      <div class="space-y-4 rounded-md">
        <!-- Email Input -->
        <div>
          <label htmlFor="email-address" class="text-xs font-semibold text-textSecondary uppercase tracking-wider block mb-2 text-left">
            Email Address
          </label>
          <input
            id="email-address"
            type="email"
            required
            class="block w-full px-3 py-3 border border-cardBorder rounded-lg bg-background/60 text-textPrimary placeholder-textSecondary focus:outline-none focus:border-tealAccent focus:ring-1 focus:ring-tealAccent transition-all text-sm"
            placeholder="you@example.com"
          />
        </div>

        <!-- Password Input -->
        <div>
          <label htmlFor="password" class="text-xs font-semibold text-textSecondary uppercase tracking-wider block mb-2 text-left">
            Password
          </label>
          <input
            id="password"
            type="password"
            required
            class="block w-full px-3 py-3 border border-cardBorder rounded-lg bg-background/60 text-textPrimary placeholder-textSecondary focus:outline-none focus:border-tealAccent focus:ring-1 focus:ring-tealAccent transition-all text-sm"
            placeholder="••••••••"
          />
        </div>
      </div>

      <div class="flex items-center justify-between text-xs">
        <span class="text-textSecondary flex items-center gap-1">
          🔒 Private Student Access Only
        </span>
      </div>

      <div>
        <button
          type="submit"
          class="group relative flex w-full justify-center rounded-lg bg-tealAccent px-4 py-3 text-sm font-semibold text-background hover:bg-tealAccent/80 focus:outline-none focus:ring-2 focus:ring-tealAccent transition-all font-display items-center gap-1 cursor-pointer"
        >
          Sign In
        </button>
      </div>
    </form>

    <div class="text-center text-xs text-textSecondary pt-4 border-t border-cardBorder/40">
      <p class="mb-2">
        Default credentials for this preview:
      </p>
      <p class="font-mono text-[10px] text-tealAccent">
        Admin: sonali@kothari.com / sonaliadmin123
      </p>
      <p class="font-mono text-[10px] text-tealAccent mt-1">
        Student: student@example.com / student123
      </p>
      <p class="mt-4">
        <a href="preview.html" class="text-textSecondary hover:underline">← Back to Home Page</a>
      </p>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email-address').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorBox = document.getElementById('errorBox');

      errorBox.classList.add('hidden');

      if (email === 'sonali@kothari.com' && password === 'sonaliadmin123') {
        window.location.href = 'preview-admin.html';
      } else if (email === 'student@example.com' && password === 'student123') {
        window.location.href = 'preview-dashboard.html';
      } else {
        errorBox.textContent = 'Invalid email address or password for this preview.';
        errorBox.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
